<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kronos Trading Bot</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap');

  :root {
    --bg: #080c10;
    --surface: #0d1117;
    --surface2: #131a22;
    --border: #1e2d3d;
    --accent: #00e5ff;
    --accent2: #7c3aed;
    --green: #00c896;
    --red: #ff4757;
    --yellow: #ffd60a;
    --text: #e2e8f0;
    --muted: #4a6278;
    --mono: 'Space Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; overflow-x: hidden; }

  body::before {
    content: ''; position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,229,255,0.012) 2px, rgba(0,229,255,0.012) 4px);
    pointer-events: none; z-index: 9999;
  }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 28px; border-bottom: 1px solid var(--border);
    background: var(--surface); position: sticky; top: 0; z-index: 100;
  }

  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-mark {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-weight: 700; font-size: 14px; color: #000;
  }
  .logo-text { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
  .logo-text span { color: var(--accent); }
  .header-right { display: flex; align-items: center; gap: 16px; }

  .status-pill {
    display: flex; align-items: center; gap: 8px; padding: 6px 14px;
    border-radius: 100px; font-family: var(--mono); font-size: 11px; font-weight: 700;
    letter-spacing: 0.05em; text-transform: uppercase; border: 1px solid var(--border); background: var(--surface2);
  }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
  .status-dot.live { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
  .status-dot.stopped { background: var(--red); }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  .btn {
    padding: 8px 18px; border-radius: 6px; font-family: var(--mono); font-size: 11px;
    font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
    cursor: pointer; border: none; transition: all 0.15s;
  }
  .btn-stop { background: rgba(255,71,87,0.15); color: var(--red); border: 1px solid rgba(255,71,87,0.3); }
  .btn-stop:hover { background: rgba(255,71,87,0.25); }
  .btn-start { background: rgba(0,200,150,0.15); color: var(--green); border: 1px solid rgba(0,200,150,0.3); }
  .btn-start:hover { background: rgba(0,200,150,0.25); }
  .btn-yellow { background: rgba(255,214,10,0.12); color: var(--yellow); border: 1px solid rgba(255,214,10,0.25); }

  .main {
    display: grid; grid-template-columns: 1fr 320px;
    gap: 16px; padding: 20px 28px; max-width: 1600px; margin: 0 auto;
  }

  .stats-row { grid-column: 1 / -1; display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }

  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 18px 20px; position: relative; overflow: hidden;
  }
  .stat-card::after {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0; transition: opacity 0.3s;
  }
  .stat-card:hover::after { opacity: 1; }

  .stat-label { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 8px; }
  .stat-value { font-family: var(--mono); font-size: 22px; font-weight: 700; line-height: 1; }
  .stat-value.up { color: var(--green); }
  .stat-value.down { color: var(--red); }
  .stat-value.accent { color: var(--accent); }
  .stat-sub { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 6px; }

  .chart-section {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden; grid-row: 2 / 4;
  }

  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px; border-bottom: 1px solid var(--border);
  }

  .section-title {
    font-size: 13px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.08em; display: flex; align-items: center; gap: 8px;
  }
  .section-title::before {
    content: ''; display: block; width: 3px; height: 14px;
    background: var(--accent); border-radius: 2px;
  }

  #chart-container { height: 460px; width: 100%; }

  .chart-controls { display: flex; align-items: center; gap: 12px; }
  .chart-loading { font-family: var(--mono); font-size: 10px; color: var(--muted); }
  .chart-intervals { display: flex; gap: 4px; }
  .interval-btn {
    padding: 4px 10px; border-radius: 4px; font-family: var(--mono); font-size: 10px;
    font-weight: 700; cursor: pointer; border: 1px solid var(--border);
    background: transparent; color: var(--muted); transition: all 0.15s;
  }
  .interval-btn.active, .interval-btn:hover {
    background: rgba(0,229,255,0.1); color: var(--accent); border-color: rgba(0,229,255,0.3);
  }

  .right-panel { display: flex; flex-direction: column; gap: 16px; grid-row: 2 / 4; }
  .panel-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }

  .position-body { padding: 20px; }
  .position-empty { text-align: center; padding: 30px 20px; color: var(--muted); font-family: var(--mono); font-size: 12px; }
  .position-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .position-row:last-child { border-bottom: none; }
  .pos-label { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .pos-value { font-family: var(--mono); font-size: 12px; font-weight: 700; }

  .trades-body { max-height: 360px; overflow-y: auto; }
  .trades-body::-webkit-scrollbar { width: 4px; }
  .trades-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .trade-row {
    display: grid; grid-template-columns: 44px 1fr 1fr 1fr;
    gap: 8px; align-items: center; padding: 10px 16px;
    border-bottom: 1px solid var(--border); font-family: var(--mono); font-size: 11px; transition: background 0.15s;
  }
  .trade-row:hover { background: var(--surface2); }
  .trade-row:last-child { border-bottom: none; }
  .trade-side { font-weight: 700; font-size: 10px; padding: 3px 7px; border-radius: 4px; text-align: center; }
  .trade-side.BUY { background: rgba(0,200,150,0.15); color: var(--green); border: 1px solid rgba(0,200,150,0.25); }
  .trade-side.SELL { background: rgba(255,71,87,0.15); color: var(--red); border: 1px solid rgba(255,71,87,0.25); }
  .trade-pnl { text-align: right; }
  .trade-pnl.pos { color: var(--green); }
  .trade-pnl.neg { color: var(--red); }

  .no-trades { padding: 24px; text-align: center; font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .last-update { font-family: var(--mono); font-size: 10px; color: var(--muted); }

  @media (max-width: 1100px) {
    .main { grid-template-columns: 1fr; }
    .stats-row { grid-template-columns: repeat(3, 1fr); }
    .chart-section, .right-panel { grid-row: auto; }
  }
  @media (max-width: 600px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .main { padding: 12px 16px; }
    header { padding: 12px 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">K</div>
    <div class="logo-text">KRONOS <span>TRADER</span></div>
  </div>
  <div class="header-right">
    <span class="last-update" id="last-update">—</span>
    <div class="status-pill">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">CONNECTING</span>
    </div>
    <button class="btn btn-yellow" onclick="closePosition()">Close Position</button>
    <button class="btn btn-stop" id="toggle-btn" onclick="toggleBot()">Stop Bot</button>
  </div>
</header>

<div class="main">

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Balance (USDT)</div>
      <div class="stat-value" id="stat-balance">—</div>
      <div class="stat-sub" id="stat-symbol">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Live Price</div>
      <div class="stat-value accent" id="stat-price">—</div>
      <div class="stat-sub" id="stat-price-change">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Position Value</div>
      <div class="stat-value" id="stat-position-val">—</div>
      <div class="stat-sub" id="stat-position-qty">No open position</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Unrealised P&amp;L</div>
      <div class="stat-value" id="stat-upnl">—</div>
      <div class="stat-sub" id="stat-upnl-pct">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Trades</div>
      <div class="stat-value" id="stat-trades">0</div>
      <div class="stat-sub" id="stat-winrate">—</div>
    </div>
  </div>

  <div class="chart-section">
    <div class="section-header">
      <div class="section-title" id="chart-title">Price Chart</div>
      <div class="chart-controls">
        <span class="chart-loading" id="chart-loading"></span>
        <div class="chart-intervals">
          <button class="interval-btn active" data-interval="1m">1m</button>
          <button class="interval-btn" data-interval="5m">5m</button>
          <button class="interval-btn" data-interval="15m">15m</button>
          <button class="interval-btn" data-interval="1h">1h</button>
        </div>
      </div>
    </div>
    <div id="chart-container"></div>
  </div>

  <div class="right-panel">
    <div class="panel-card">
      <div class="section-header">
        <div class="section-title">Open Position</div>
      </div>
      <div class="position-body" id="position-body">
        <div class="position-empty">No open position</div>
      </div>
    </div>

    <div class="panel-card" style="flex:1">
      <div class="section-header">
        <div class="section-title">Trade History</div>
        <span style="font-family:var(--mono);font-size:10px;color:var(--muted)" id="trade-count">0 trades</span>
      </div>
      <div class="trades-body" id="trades-body">
        <div class="no-trades">No trades yet</div>
      </div>
    </div>
  </div>

</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
let chart, candleSeries;
let currentInterval = '1m';
let botRunning = true;
let lastPrice = null;
let currentSymbol = 'SOLUSDT';
let chartData = [];
let isLoadingChart = false;

// ─── Chart init ───────────────────────────────────────────────────────────────
function initChart() {
  const container = document.getElementById('chart-container');
  chart = LightweightCharts.createChart(container, {
    width: container.clientWidth,
    height: 460,
    layout: { background: { color: 'transparent' }, textColor: '#8899aa' },
    grid: {
      vertLines: { color: 'rgba(30,45,61,0.6)' },
      horzLines: { color: 'rgba(30,45,61,0.6)' },
    },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    rightPriceScale: { borderColor: 'rgba(30,45,61,0.8)' },
    timeScale: { borderColor: 'rgba(30,45,61,0.8)', timeVisible: true, secondsVisible: false },
  });

  candleSeries = chart.addCandlestickSeries({
    upColor: '#00c896', downColor: '#ff4757',
    borderUpColor: '#00c896', borderDownColor: '#ff4757',
    wickUpColor: '#00c896', wickDownColor: '#ff4757',
  });

  window.addEventListener('resize', () => {
    chart.applyOptions({ width: container.clientWidth });
  });
}

// ─── Load klines from API ─────────────────────────────────────────────────────
async function loadKlines(interval, symbol) {
  if (isLoadingChart) return;
  isLoadingChart = true;
  document.getElementById('chart-loading').textContent = 'Loading...';

  const limitMap = { '1m': 300, '5m': 300, '15m': 200, '1h': 200 };
  const limit = limitMap[interval] || 200;
  const sym = symbol || currentSymbol;

  try {
    const res = await fetch(`/api/klines?interval=${interval}&limit=${limit}&symbol=${sym}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (!Array.isArray(data) || data.length === 0) throw new Error('No candle data returned');

    // Convert ms timestamps to seconds, ensure ascending order
    chartData = data
      .map(d => ({
        time: Math.floor(d.time / 1000),
        open: parseFloat(d.open),
        high: parseFloat(d.high),
        low: parseFloat(d.low),
        close: parseFloat(d.close),
      }))
      .sort((a, b) => a.time - b.time);

    candleSeries.setData(chartData);
    chart.applyOptions({ timeScale: { secondsVisible: interval === '1m' } });
    chart.timeScale().fitContent();

    document.getElementById('chart-title').textContent = `${sym} · ${interval}`;
    document.getElementById('chart-loading').textContent = `${chartData.length} candles`;
  } catch(e) {
    console.error('Chart load error:', e);
    document.getElementById('chart-loading').textContent = '⚠ Chart error';
  }
  isLoadingChart = false;
}

// ─── Update last candle with live price ───────────────────────────────────────
function updateLastCandle(price) {
  if (!candleSeries || chartData.length === 0 || !price) return;

  const durationMap = { '1m': 60, '5m': 300, '15m': 900, '1h': 3600 };
  const duration = durationMap[currentInterval] || 300;
  const now = Math.floor(Date.now() / 1000);
  const candleStart = Math.floor(now / duration) * duration;
  const last = chartData[chartData.length - 1];

  if (candleStart > last.time) {
    // New candle
    const newCandle = { time: candleStart, open: price, high: price, low: price, close: price };
    chartData.push(newCandle);
    candleSeries.update(newCandle);
  } else {
    // Update current candle
    const updated = {
      time: last.time,
      open: last.open,
      high: Math.max(last.high, price),
      low: Math.min(last.low, price),
      close: price,
    };
    chartData[chartData.length - 1] = updated;
    candleSeries.update(updated);
  }
}

// ─── Interval buttons ─────────────────────────────────────────────────────────
document.querySelectorAll('.interval-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.interval-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentInterval = btn.dataset.interval;
    chartData = [];
    loadKlines(currentInterval, currentSymbol);
  });
});

// ─── Helpers ──────────────────────────────────────────────────────────────────
function fmtPrice(n, decimals) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  const d = decimals !== undefined ? decimals : (parseFloat(n) > 100 ? 2 : 4);
  return '$' + parseFloat(n).toLocaleString('en-US', { minimumFractionDigits: d, maximumFractionDigits: d });
}

function fmtQty(n, sym) {
  if (!n) return '—';
  return parseFloat(n).toFixed(4) + (sym ? ' ' + sym.replace('USDT','') : '');
}

function fmtTime(iso) {
  return new Date(iso).toLocaleString('en-AU', {
    hour: '2-digit', minute: '2-digit', second: '2-digit', day: '2-digit', month: '2-digit'
  });
}

// ─── Status update ────────────────────────────────────────────────────────────
async function updateStatus() {
  try {
    const res = await fetch('/api/status');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const d = await res.json();
    if (d.error) throw new Error(d.error);

    botRunning = d.running;
    currentSymbol = d.symbol || currentSymbol;

    // Status pill
    const dot = document.getElementById('status-dot');
    const txt = document.getElementById('status-text');
    const btn = document.getElementById('toggle-btn');
    if (d.running) {
      dot.className = 'status-dot live'; txt.textContent = 'LIVE';
      btn.textContent = 'Stop Bot'; btn.className = 'btn btn-stop';
    } else {
      dot.className = 'status-dot stopped'; txt.textContent = 'STOPPED';
      btn.textContent = 'Start Bot'; btn.className = 'btn btn-start';
    }

    // Balance
    document.getElementById('stat-balance').textContent = fmtPrice(d.balance_usdt, 2);
    document.getElementById('stat-symbol').textContent = d.symbol || '—';

    // Live price
    const price = parseFloat(d.current_price);
    if (price > 0) {
      document.getElementById('stat-price').textContent = fmtPrice(price);
      if (lastPrice !== null && lastPrice > 0) {
        const chg = price - lastPrice;
        const pct = (chg / lastPrice * 100).toFixed(3);
        const sub = document.getElementById('stat-price-change');
        sub.textContent = (chg >= 0 ? '▲ ' : '▼ ') + Math.abs(pct) + '%';
        sub.style.color = chg >= 0 ? 'var(--green)' : 'var(--red)';
      }
      lastPrice = price;
      updateLastCandle(price);
    }

    // Position value
    if (d.position && price > 0) {
      document.getElementById('stat-position-val').textContent = fmtPrice(d.position.qty * price, 2);
      document.getElementById('stat-position-qty').textContent = fmtQty(d.position.qty, d.symbol) + ' held';
    } else {
      document.getElementById('stat-position-val').textContent = '—';
      document.getElementById('stat-position-qty').textContent = 'No open position';
    }

    // Unrealised PnL
    const upnlEl = document.getElementById('stat-upnl');
    const upnlPct = document.getElementById('stat-upnl-pct');
    if (d.position && price > 0) {
      const pnl = (price - d.position.entry_price) * d.position.qty;
      const pct = ((price - d.position.entry_price) / d.position.entry_price * 100);
      upnlEl.textContent = (pnl >= 0 ? '+' : '') + fmtPrice(pnl, 4);
      upnlEl.className = 'stat-value ' + (pnl >= 0 ? 'up' : 'down');
      upnlPct.textContent = (pct >= 0 ? '+' : '') + pct.toFixed(3) + '%';
      upnlPct.style.color = pct >= 0 ? 'var(--green)' : 'var(--red)';
    } else {
      upnlEl.textContent = '—'; upnlEl.className = 'stat-value';
      upnlPct.textContent = '—'; upnlPct.style.color = '';
    }

    // Trade stats
    const trades = d.trade_history || [];
    const sells = trades.filter(t => t.side === 'SELL');
    const pnls = sells.map(s => s.meta?.pnl || 0);
    const wins = pnls.filter(p => p > 0).length;
    document.getElementById('stat-trades').textContent = trades.length;
    document.getElementById('stat-winrate').textContent =
      pnls.length > 0 ? `${(wins/pnls.length*100).toFixed(0)}% win rate` : 'No closed trades';
    document.getElementById('trade-count').textContent = `${trades.length} trades`;

    renderPosition(d.position, price, d.symbol, d.actual_asset_balance, d.asset_name);
    renderTrades(trades);
    document.getElementById('last-update').textContent = 'Updated ' + new Date().toLocaleTimeString('en-AU');

  } catch(e) {
    console.warn('Status error:', e.message);
    document.getElementById('status-dot').className = 'status-dot stopped';
    document.getElementById('status-text').textContent = 'ERROR';
  }
}

function renderPosition(pos, price, symbol, actualAssetBalance, assetName) {
  const el = document.getElementById('position-body');
  if (!pos) { el.innerHTML = '<div class="position-empty">⬜ No open position</div>'; return; }

  const pnl = (price - pos.entry_price) * pos.qty;
  const pct = ((price - pos.entry_price) / pos.entry_price * 100).toFixed(3);
  const col = pnl >= 0 ? 'var(--green)' : 'var(--red)';
  
  // Highlight if there is a discrepancy (dust/fee issue)
  const discrepancy = Math.abs(pos.qty - actualAssetBalance) > 0.00001;
  const actualCol = discrepancy ? 'var(--yellow)' : 'var(--text)';

  el.innerHTML = `
    <div class="position-row"><span class="pos-label">Symbol</span><span class="pos-value">${symbol}</span></div>
    <div class="position-row"><span class="pos-label">Tracked Qty</span><span class="pos-value">${parseFloat(pos.qty).toFixed(6)}</span></div>
    <div class="position-row"><span class="pos-label">Exchange Balance</span><span class="pos-value" style="color:${actualCol}">${parseFloat(actualAssetBalance || 0).toFixed(6)} ${assetName}</span></div>
    <div class="position-row"><span class="pos-label">Entry Price</span><span class="pos-value">${fmtPrice(pos.entry_price)}</span></div>
    <div class="position-row"><span class="pos-label">Live Price</span><span class="pos-value" style="color:var(--accent)">${fmtPrice(price)}</span></div>
    <div class="position-row"><span class="pos-label">Unrealised P&L</span><span class="pos-value" style="color:${col}">${pnl>=0?'+':''}${fmtPrice(pnl,4)} (${pct}%)</span></div>
    <div class="position-row"><span class="pos-label">Stop Loss</span><span class="pos-value" style="color:var(--red)">${fmtPrice(pos.entry_price*0.98)}</span></div>
    <div class="position-row"><span class="pos-label">Take Profit</span><span class="pos-value" style="color:var(--green)">${fmtPrice(pos.entry_price*1.04)}</span></div>
    <div class="position-row"><span class="pos-label">Entered</span><span class="pos-value">${fmtTime(pos.entry_time)}</span></div>
    <div style="margin-top:14px">
      <button class="btn btn-yellow" style="width:100%;text-align:center" onclick="closePosition()">✕ Close Position</button>
    </div>`;
}

function renderTrades(trades) {
  const el = document.getElementById('trades-body');
  if (!trades || trades.length === 0) { el.innerHTML = '<div class="no-trades">No trades yet</div>'; return; }
  let html = '';
  for (const t of [...trades].reverse()) {
    const pnl = t.meta?.pnl;
    const pnlStr = pnl !== undefined
      ? `<span class="trade-pnl ${pnl>=0?'pos':'neg'}">${pnl>=0?'+':''}${fmtPrice(pnl,4)}</span>`
      : '<span class="trade-pnl" style="color:var(--muted)">—</span>';
    html += `
      <div class="trade-row">
        <span class="trade-side ${t.side}">${t.side}</span>
        <span style="color:var(--text)">${fmtPrice(t.price)}</span>
        <span style="color:var(--muted)">${parseFloat(t.qty||0).toFixed(4)}</span>
        ${pnlStr}
        <span style="grid-column:1/-1;font-size:9px;color:var(--muted);margin-top:-4px">
          ${fmtTime(t.time)}${t.meta?.reason?' · '+t.meta.reason:''}${t.meta?.method?' · '+t.meta.method:''}
        </span>
      </div>`;
  }
  el.innerHTML = html;
}

async function toggleBot() {
  await fetch(botRunning ? '/api/stop' : '/api/start', { method: 'POST' });
  await updateStatus();
}

async function closePosition() {
  if (!confirm('Close position at market price?')) return;
  await fetch('/api/close_position', { method: 'POST' });
  await updateStatus();
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
initChart();

(async () => {
  await updateStatus();                              // get symbol first
  await loadKlines(currentInterval, currentSymbol); // then load chart
})();

setInterval(updateStatus, 5000);                    // live price every 5s → updates candle
setInterval(() => loadKlines(currentInterval, currentSymbol), 120000); // full reload every 2min
</script>
